<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angelo Patane | Automotive Photography</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>Angelo Patane</h1>
    <p>Automotive Photography Portfolio</p>
  </header>

  <main class="gallery">
    <section>
      <h2>Featured Work</h2>
      <div class="grid">
        <img src="images/featured/photo1.jpg" alt="Automotive featured shot 1">
        <img src="images/featured/photo2.jpg" alt="Automotive featured shot 2">
        <img src="images/featured/photo3.jpg" alt="Automotive featured shot 3">
      </div>
    </section>

    <section>
      <h2>Rolling Shots</h2>
      <div class="grid">
        <img src="images/rollers/photo1.jpg" alt="Rolling shot 1">
        <img src="images/rollers/photo2.jpg" alt="Rolling shot 2">
      </div>
    </section>

    <section>
      <h2>Details</h2>
      <div class="grid">
        <img src="images/details/photo1.jpg" alt="Detail shot 1">
        <img src="images/details/photo2.jpg" alt="Detail shot 2">
      </div>
    </section>

    <section>
      <h2>Artistic</h2>
      <div class="grid">
        <img src="images/artistic/photo1.jpg" alt="Artistic automotive shot 1">
        <img src="images/artistic/photo2.jpg" alt="Artistic automotive shot 2">
      </div>
    </section>
  </main>
</body>
</html>
